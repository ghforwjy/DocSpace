include /etc/nginx/includes/http-common.conf;
server {
  listen 0.0.0.0:80;
  listen [::]:80 default_server;
  server_name _;
  server_tokens off;
  set $secure_link_secret M4B6P9CJAnDznMatc3KC;
  root /nowhere;

  location ~ ^/welcome/(.*)$ {
    alias /var/www/onlyoffice/documentserver-example/welcome/$1;
    index docker.html;
    expires 365d;
  }

  location /example/ {
    proxy_pass http://example/;
    proxy_set_header X-Forwarded-Host $the_host;
    proxy_set_header X-Forwarded-Proto $the_scheme;
    proxy_set_header X-Forwarded-Path /example;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    rewrite ^ https://$host:8443$request_uri? permanent;
  }
}

server {
  listen 127.0.0.1:80;
  listen [::1]:80;
  server_name localhost;
  server_tokens off;
  set $secure_link_secret M4B6P9CJAnDznMatc3KC;
  include /etc/nginx/includes/ds-common.conf;
  include /etc/nginx/includes/ds-docservice.conf;
}

server {
  listen 0.0.0.0:443 ssl http2;
  listen [::]:443 ssl default_server http2;
  server_tokens off;
  set $secure_link_secret M4B6P9CJAnDznMatc3KC;
  root /usr/share/nginx/html;
  ssl_certificate /etc/onlyoffice/documentserver/ssl/self.crt;
  ssl_certificate_key /etc/onlyoffice/documentserver/ssl/self.key;
  ssl_verify_client off;
  ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
  ssl_protocols TLSv1.2;
  ssl_session_cache builtin:1000 shared:SSL:10m;
  ssl_prefer_server_ciphers on;
  add_header Strict-Transport-Security max-age=31536000;
  add_header X-Content-Type-Options nosniff;
  include /etc/nginx/includes/ds-*.conf;
}